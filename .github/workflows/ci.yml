name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck
      - run: bun test plugins/claude-code/test/analyze-transcript.test.ts plugins/claude-code/test/bootstrap.test.ts plugins/claude-code/test/config-protocol.test.ts plugins/claude-code/test/omission.test.ts plugins/claude-code/test/workflow.test.ts
      - run: bun run test:bootstrap
      - run: bun run test:integration
      - name: Verify clean generated state
        run: git diff --exit-code
