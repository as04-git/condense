name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/condense
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck
      - run: bun test ./test/analyze-transcript.test.ts ./test/config-protocol.test.ts ./test/omission.test.ts ./test/workflow.test.ts
      - run: bun run test:integration
      - name: Verify clean generated state
        working-directory: .
        run: git diff --exit-code
