name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck
      - run: bun test plugins/claude-code/test/analyze-transcript.test.ts plugins/claude-code/test/bootstrap.test.ts plugins/claude-code/test/config-protocol.test.ts plugins/claude-code/test/omission.test.ts plugins/claude-code/test/workflow.test.ts
      - run: bun run test:bootstrap
      - run: bun run test:integration
      - name: Verify clean generated state
        run: git diff --exit-code
