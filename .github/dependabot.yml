version: 2

updates:
  - package-ecosystem: bun
    directories:
      - /
      - /plugins/claude-code/runtime
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    groups:
      same-dependency-across-manifests:
        patterns:
          - "*"
        group-by: dependency-name
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
